# The main pipeline for khanbrick

resources:
  pipelines:
    khanbrick_etl:
      name: khanbrick_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/khanbrick_etl"

      libraries:
        - glob:
            include: ../src/khanbrick_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
