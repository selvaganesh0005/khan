# This is a Databricks asset bundle definition for khanbrick.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: khanbrick
  uuid: a201d038-3690-4c48-ab1e-66866fb057b0

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405609997871664.4.azuredatabricks.net
    variables:
      catalog: devkhan
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405609997871664.4.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/harshavardhan22012003_gmail.com#ext#@harshavardhan22012003gmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/harshavardhan22012003_gmail.com#ext#@harshavardhan22012003gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: devkhan
      schema: prod
    permissions:
      - user_name: harshavardhan22012003_gmail.com#ext#@harshavardhan22012003gmail.onmicrosoft.com
        level: CAN_MANAGE
